<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Para mi mejor amigo 🤜🏾🤛🏾</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0f172a; /* Azul oscuro elegante */
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* El área táctil ocupa toda la pantalla */
        #click-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            z-index: 2;
            pointer-events: none; /* Deja pasar los clics al fondo */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { font-size: 1.5rem; margin-bottom: 10px; color: #38bdf8; }
        p { opacity: 0.8; font-size: 0.9rem; }

        .msg-flotante {
            position: absolute;
            pointer-events: none;
            z-index: 100;
            animation: flotar 1.5s ease-out forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 200px;
            margin-left: -100px; /* Centra el mensaje en el toque */
        }

        .texto {
            background: #38bdf8;
            color: #0f172a;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4);
        }

        .emoji { font-size: 2rem; margin-top: 5px; }

        @keyframes flotar {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1); opacity: 0; }
        }

        .firma {
            position: fixed;
            bottom: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #38bdf8;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div id="click-area"></div>

    <div class="card">
        <h1>Brother, esto es para ti 🤜🏾🤛🏾</h1>
        <p>Toca la pantalla en cualquier lado...</p>
    </div>

    <div class="firma">HECHO POR XMIHAI_</div>

    <script>
        const frases = [
            "te quiero bro 🫶🏾🥺🫶🏾",
            "todo pasa por algo ✨",
            "todo saldrá bien 🙏🏾",
            "siempre firmes 🤜🏾🤛🏾",
            "eres un grande",
            "la vida sigue y tú eres capaz",
            "gracias por estar siempre",
            "nunca te rindas 🚀"
        ];

        let i = 0;
        const area = document.getElementById('click-area');

        function crearMensaje(x, y) {
            const div = document.createElement('div');
            div.className = 'msg-flotante';
            div.style.left = x + 'px';
            div.style.top = y + 'px';

            const fraseActual = frases[i];
            i = (i + 1) % frases.length;

            div.innerHTML = `<span class="texto">${fraseActual}</span><span class="emoji">✨</span>`;

            document.body.appendChild(div);

            // Se borra solo al terminar la animación
            setTimeout(() => div.remove(), 1500);
        }

        // Detectar en PC
        area.addEventListener('mousedown', (e) => {
            crearMensaje(e.clientX, e.clientY);
        });

        // Detectar en Móvil (sin retraso)
        area.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            crearMensaje(touch.clientX, touch.clientY);
        }, { passive: false });

    </script>
</body>
</html>
